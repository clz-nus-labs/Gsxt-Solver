name: python-package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -c "from gsxt_solver import ModelPaths, Solver; print('import ok')"
        env:
          PYTHONPATH: src
